<svg xmlns="http://www.w3.org/2000/svg" width="760" height="470" viewBox="0 0 760 470" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="760" height="470" rx="16" fill="#0f172a"/>
  <rect x="20" y="20" width="720" height="52" rx="10" fill="#1e293b"/>
  <circle cx="48" cy="46" r="16" fill="#2563eb"/>
  <text x="48" y="51" fill="#ffffff" font-size="15" text-anchor="middle">AI</text>
  <text x="78" y="42" fill="#e2e8f0" font-size="15" font-weight="600">AI Operations Assistant</text>
  <text x="78" y="60" fill="#64748b" font-size="12">the model proposes the plan · the server decides what runs</text>

  <!-- user bubble -->
  <rect x="330" y="88" width="410" height="40" rx="12" fill="#2563eb"/>
  <text x="352" y="113" fill="#ffffff" font-size="13.5">reply to the client's last email and send it</text>

  <!-- bot bubble: the rendered plan awaiting approval -->
  <rect x="20" y="140" width="600" height="238" rx="12" fill="#1e293b"/>
  <text x="40" y="166" fill="#e2e8f0" font-size="13.5" font-weight="600">Reply to the latest email</text>
  <text x="40" y="188" fill="#94a3b8" font-size="12.5">Status: awaiting_approval</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5">
    <text x="40" y="216" fill="#4ade80">✅ email.search  [read_only] — succeeded</text>
    <text x="58" y="236" fill="#94a3b8">• anna@example.com — Re: Order #4821</text>
    <text x="40" y="262" fill="#fbbf24">⏸️  email.send  [external_side_effect] — awaiting_approval</text>
    <text x="58" y="282" fill="#e2e8f0">↳ to: </text>
    <text x="92" y="282" fill="#fbbf24" font-weight="700">anna@example.com</text>
    <text x="58" y="300" fill="#e2e8f0">↳ subject: Re: Order #4821</text>
    <text x="58" y="318" fill="#e2e8f0">↳ body: Hi Anna — yes, your order ships Monday…</text>
  </g>

  <rect x="40" y="334" width="168" height="30" rx="8" fill="#16a34a"/>
  <text x="124" y="354" fill="#ffffff" font-size="12.5" text-anchor="middle">✅ Approve: email.send</text>
  <rect x="218" y="334" width="96" height="30" rx="8" fill="#334155"/>
  <text x="266" y="354" fill="#e2e8f0" font-size="12.5" text-anchor="middle">❌ Reject</text>

  <!-- caption -->
  <text x="20" y="410" fill="#38bdf8" font-size="12.5" font-weight="600">The server resolved {{s1.from}} to the real recipient before asking —</text>
  <text x="20" y="430" fill="#94a3b8" font-size="12.5">the human approves the concrete action, and nothing external runs without the tap.</text>
  <text x="20" y="454" fill="#64748b" font-size="11.5">Rendered from the bot's actual output (sandbox mode). Read-only search auto-ran; the send is gated.</text>
</svg>
