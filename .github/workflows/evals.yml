name: Evals

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1" # Mondays, 07:00 UTC

permissions:
  contents: read

jobs:
  evals:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
      - run: uv sync --locked
      - name: Offline golden scenarios (regression gate)
        run: uv run python -m evals.run
      - name: Live planner evals (skips without a key)
        env:
          OPS_LLM_API_KEY: ${{ secrets.OPS_LLM_API_KEY }}
          OPS_LLM_BASE_URL: ${{ secrets.OPS_LLM_BASE_URL }}
          OPS_LLM_MODEL: ${{ secrets.OPS_LLM_MODEL }}
        run: uv run python -m evals.planner_live
